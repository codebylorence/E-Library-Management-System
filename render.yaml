services:
  - type: web
    name: e-library-management-system
    runtime: node
    buildCommand: npm install --prefix back && npm install --prefix front && npm run build --prefix front
    startCommand: node back/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: elibrary-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: elibrary-db
    databaseName: elibrary_db
    user: elibrary_user
    plan: free
